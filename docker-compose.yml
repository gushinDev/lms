version: "3.7"
services:
    app:
        build:
            args:
                user: sammy
                uid: 1000
            context: ./docker-compose
            dockerfile: Dockerfile
        image: app-image
        container_name: app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - app-network

    db:
        image: mysql:latest
        container_name: db
        restart: unless-stopped
        ports:
            - '3306:3306'
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - mysql-db:/var/lib/mysql
        networks:
            - app-network
    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: unless-stopped
        ports:
            - 80:80
        volumes:
            - ./:/var/www
            - ./docker-compose/nginx:/etc/nginx/conf.d/:ro
        networks:
            - app-network
networks:
    app-network:
        driver: bridge
volumes:
    mysql-db:
